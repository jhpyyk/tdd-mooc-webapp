services:
  test_db:
    container_name: item_store_test_db
    restart: no
    image: postgres
    ports:
      - 5433:5432
    volumes:
      - ../../sql/create-test-tables.sql:/docker-entrypoint-initdb.d/create-test-tables.sql:ro
    environment:
      - POSTGRES_USER=user
      - POSTGRES_DB=test_db
      - POSTGRES_PASSWORD=password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d test_db"]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 5s

volumes:
  data: {}
